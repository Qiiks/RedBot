version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      AUTH_DISCORD_ID: ${AUTH_DISCORD_ID}
      AUTH_DISCORD_SECRET: ${AUTH_DISCORD_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    expose:
      - "3000"

  bot-gateway:
    build:
      context: .
      dockerfile: apps/bot-gateway/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      LAVALINK_NODE_NAME: ${LAVALINK_NODE_NAME:-local}
      LAVALINK_NODE_URL: ${LAVALINK_NODE_URL}
      LAVALINK_NODE_AUTH: ${LAVALINK_NODE_AUTH}
      LAVALINK_NODE_SECURE: ${LAVALINK_NODE_SECURE:-false}
      CRITICAL_ALERT_WEBHOOK_URL: ${CRITICAL_ALERT_WEBHOOK_URL:-}

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      CRITICAL_ALERT_WEBHOOK_URL: ${CRITICAL_ALERT_WEBHOOK_URL:-}
